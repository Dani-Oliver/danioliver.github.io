<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | LOJA DE VENDAS</title>
    <link rel="stylesheet" href="stylescontact.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/slideout/1.0.1/slideout.min.js"></script>
</head>
<body>
    <div class="menu" id="menu">
        <header>
            <ul>
                <li><a href="index.html">INÍCIO</a></li>
                <li><a href="indexcontato.html">CONTATO</a></li>
                <li><a href="indexsobre.html">SOBRE</a></li>                               
            </ul>
        </header>
    </div>
    <div class="content" id="content">
        <div class="toggle-button" id="toggle-button">Menu</div>
        <main>
            <section class="contact-section">
                <h1>Contato</h1>
                <p>Fale conosco!</p>
                <form id="contact-form">
                    <label for="name">Nome:</label>
                    <input type="text" id="name" name="name" required>
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" required>
                    <label for="message">Mensagem:</label>
                    <textarea id="message" name="message" required></textarea>
                    <button type="submit">Enviar</button>
                </form>
                <div class="contact-info">
                    <h2>Informações de Contato</h2>
                    <p>Endereço: Rua das lojas, 123 - IGRAPIÚNA, BA</p>
                    <p>Telefone: (73) 9876-5432</p>
                    <p>E-mail: contato@lojadevendas.com.br</p>
                    <p>Horário de Atendimento: Segunda a Sabado, 8h as 17h</p>
                </div>
            </section>
        </main>
        <footer>
            <p>&copy; 2026 EBAC LOJA v2</p>
        </footer>
        <script src="scriptcontact.js"></script>
    </div>
    <script>
        var menu = document.getElementById('menu');
        var content =  document.getElementById('content');
        var togglebutton = document.getElementById('toggle-button');

        togglebutton.addEventListener('click', function() {
            menu.classList.toggle('is-open');
            content.classList.toggle('is-open');
        });
    </script>
</body>
</html>
